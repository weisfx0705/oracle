<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>靈曦籤苑 - 觀音百籤</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Ma+Shan+Zheng&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans TC', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'noto sans', sans-serif, 'Apple Color Emoji', 'Segoe UI Emoji', 'Segoe UI Symbol', 'Noto Color Emoji';
            background-color: #0f172a;
            color: #f1f5f9;
            overflow-x: hidden;
        }

        .font-calligraphy {
            font-family: 'Ma Shan Zheng', cursive;
        }

        .sacred-glow {
            box-shadow: 0 0 60px rgba(251, 191, 36, 0.15);
        }

        /* 暗色調神聖背景 */
        .mystic-gradient {
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
        }

        /* 下雨動畫效果 */
        .rain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .drop {
            position: absolute;
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.2) 100%);
            width: 1px;
            height: 80px;
            animation: fall linear infinite;
        }

        @keyframes fall {
            to {
                transform: translateY(100vh);
            }
        }

        /* 響應式解籤區塊樣式 */
        .interpretation-content h1,
        .interpretation-content h2 {
            font-size: 1.25rem;
            font-weight: 700;
            color: #fbbf24;
            margin-top: 1.5rem;
            margin-bottom: 0.75rem;
            border-left: 4px solid #fbbf24;
            padding-left: 0.75rem;
        }

        .interpretation-content p {
            margin-bottom: 1rem;
            line-height: 1.8;
        }

        .interpretation-content strong {
            color: #fcd34d;
        }
    </style>


</head>

<body class="mystic-gradient min-h-screen">
    <div class="rain" id="rain-container"></div>
    <div id="root" class="relative z-10"></div>
    <script>
        // 生成雨滴
        const container = document.getElementById('rain-container');
        const dropCount = 50;
        for (let i = 0; i < dropCount; i++) {
            const drop = document.createElement('div');
            drop.className = 'drop';
            drop.style.left = Math.random() * 100 + 'vw';
            drop.style.animationDuration = (Math.random() * 1 + 0.5) + 's';
            drop.style.animationDelay = Math.random() * 2 + 's';
            drop.style.opacity = Math.random() * 0.3;
            container.appendChild(drop);
        }
    </script>
    <script type="module" src="/index.tsx"></script>
</body>

</html>
